<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TJ Economy Insight | 경제 뉴스 요약 서비스</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9413831032961401"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
    <div id="market-bar" class="market-bar">
        <!-- Market indices will be injected here -->
    </div>

    <header class="header">
        <div class="header-container">
            <div class="logo-area">
                <h1>TJ Economy Insight</h1>
                <p id="current-date" class="date-text"></p>
            </div>
            <button id="theme-toggle" class="theme-toggle">다크 모드</button>
        </div>
    </header>

    <nav class="category-nav">
        <div class="nav-container">
            <button class="nav-item active" data-category="all">전체</button>
            <button class="nav-item" data-category="macro">거시경제</button>
            <button class="nav-item" data-category="stocks">증시/투자</button>
            <button class="nav-item" data-category="realestate">부동산</button>
            <button class="nav-item" data-category="tech">테크/산업</button>
            <button class="nav-item" data-category="terms">경제 용어</button>
        </div>
    </nav>

    <main class="main-content">
        <section id="hero-section" class="hero-section">
            <!-- Hero news will be injected here -->
        </section>

        <section id="news-grid" class="news-grid">
            <!-- News cards or Terms will be injected here -->
        </section>

        <section class="apartment-section">
            <div class="section-header">
                <h2>오늘의 아파트 신고가 거래</h2>
                <span class="badge">실시간 거래 정보</span>
            </div>
            <div id="apartment-list" class="apartment-list">
                <!-- Apartment data will be injected here -->
            </div>
            <p class="source-text">* 출처: 국토교통부 실거래가 시스템 (최근 24시간 기준)</p>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <section class="newsletter-section">
                <h3>경제 인사이트 뉴스레터 구독</h3>
                <p>매일 아침 가장 중요한 경제 뉴스와 요약을 메일로 보내드립니다.</p>
                <form action="https://formspree.io/f/mgorpgdk" method="POST" class="newsletter-form">
                    <input type="email" name="email" required placeholder="이메일 주소를 입력하세요">
                    <button type="submit" class="subscribe-btn">무료로 구독하기</button>
                </form>
            </section>
            <div class="footer-bottom">
                <p>&copy; 2026 TJ Economy Insight. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body">
                <!-- Detailed content will be injected here -->
            </div>
        </div>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>

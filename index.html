<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle">다크 모드</button>
        <h1>로또 번호 추첨기</h1>
        <div id="lotto-numbers" class="lotto-numbers"></div>
        <button id="generate-btn">번호 생성</button>

        <hr class="divider">

        <section class="contact-section">
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/mgorpgdk" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해주세요."></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </section>
    </div>
    <script src="main.js" type="module"></script>
</body>
</html>
